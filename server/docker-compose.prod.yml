version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sinar-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sinar}
      POSTGRES_USER: ${POSTGRES_USER:-sinar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sinar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sinar-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: sinar-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sinar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sinar}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["https://sinar.tniad.mil.id"]'}
      DEBUG: "false"
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    networks:
      - sinar-network

  web:
    build:
      context: ../
      dockerfile: Dockerfile.frontend
    container_name: sinar-web
    restart: always
    networks:
      - sinar-network

  nginx:
    image: nginx:1.25-alpine
    container_name: sinar-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/data/uploads:ro
    depends_on:
      - api
      - web
    networks:
      - sinar-network

volumes:
  pgdata:
  uploads:

networks:
  sinar-network:
    driver: bridge
