version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sinar-db
    environment:
      POSTGRES_DB: sinar
      POSTGRES_USER: sinar
      POSTGRES_PASSWORD: sinar_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinar"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sinar-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://sinar:sinar_secret@db:5432/sinar
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
